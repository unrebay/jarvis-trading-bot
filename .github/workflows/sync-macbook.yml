name: Sync main → macbook & imac

on:
  push:
    branches:
      - main

jobs:
  sync-macbook:
    name: Sync main into macbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into macbook
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout macbook
          git merge origin/main --no-edit --allow-unrelated-histories || true
          git push origin macbook

  sync-imac:
    name: Sync main into imac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into imac
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout imac
          git merge origin/main --no-edit --allow-unrelated-histories || true
          git push origin imac
