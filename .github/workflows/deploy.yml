name: Deploy → VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: []   # ci.yml runs separately on PR; deploy only after merge to main

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Deploy: $(date '+%Y-%m-%d %H:%M:%S')"
            cd /opt/jarvis
            git fetch origin main && git reset --hard origin/main
            echo "✅ Code updated"
            /opt/jarvis/venv/bin/pip install -q -r requirements.txt
            echo "✅ Deps updated"
            systemctl restart jarvis-bot
            sleep 3
            systemctl is-active jarvis-bot && echo "✅ Bot running" || (journalctl -u jarvis-bot -n 20 && exit 1)
            echo "✅ Deploy complete"
